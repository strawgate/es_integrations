title: Custom Logs
name: log
format_version: 3.2.0
description: >-
  Collect custom logs with Elastic Agent.
version: 2.4.0
type: integration
categories:
  - custom
  - custom_logs
conditions:
  kibana:
    version: ^8.8.0
policy_templates:
  - name: logs
    title: Custom Logs
    description: Collect raw logs
    inputs:
      - type: filestream
        title: Custom log file
        description: Collect logs via filestream

      - type: logfile
        title: Custom log file (Legacy)
        description: Collect logs via legacy logfile input
icons:
  - src: "/img/icon.svg"
    type: "image/svg+xml"
owner:
  github: elastic/elastic-agent-data-plane
  type: elastic